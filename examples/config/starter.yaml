starter:
  model_path: "gpt-4o" # if empty, will use starter model
  model_name: "gpt-4o" # if empty, will use starter model
  base_url: "http://172.96.160.199:3000/v1" # if empty, will use starter base_url
  api_key: "sk-..." # if empty, will use starter api_key
  tavily_api_key: "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" # Tavily API key (leave empty if not needed)
  kaggle_username: "binrxu" # Kaggle username (leave empty if not needed)
  kaggle_key: "8c120e3a3c8d45f71ace8b4981f829ac" # Kaggle API key (leave empty if not needed)

# RAG configuration (independent from obtainer)
rag:
  reset: false # whether to reset RAG database
  embed_model: "text-embedding-3-large" # RAG embedding model (default: "text-embedding-3-large", leave empty to use default)
  collection_name: "rag_collection" # RAG collection name
  api_base_url: "http://172.96.160.199:3000/v1" # RAG API base URL (if empty, will use obtainer's base_url)
  api_key_path: "./rag_api_key.txt" # RAG API key file path (if empty, will use obtainer's api_key)

default_states:
  task_id: "default"
  prompt_template_dir: "./loopai/common/prompts"
  output_dir: "./outputs"

  judger:
    eval_model_path: "/home/lpc/models/Qwen2.5-14B-Instruct/"
    eval_base_url: "http://127.0.0.1:8911/v1"
    eval_api_key: "EMPTY"
    eval_temperature: 0
    eval_top_p: 0.95
    eval_test_case_path: "./outputs/test.json"
    eval_problem_path: "./data/human-eval-v2-20210705-format.jsonl"
    eval_result_path: "./outputs/result.json"
    eval_batch_size: 10

  analyzer:
    analyze_model_path: "/home/lpc/models/Qwen2.5-14B-Instruct/"
    analyze_base_url: "http://127.0.0.1:8911/v1"
    analyze_api_key: "EMPTY"
    analyze_temperature: 0
    analyze_top_p: 0.95
    output_brief: true
    # analyze_task_type: "code"
    analyze_sampling_top_k: 5
    output_suggestion: true
    analyze_batch_size: 20

  # Obtainer agent configuration (nested structure for ObtainerAgent)
  obtainer:
    model_path: "gpt-4o" # if empty, will use starter model
    base_url: "http://172.96.160.199:3000/v1" # if empty, will use starter base_url
    api_key: "sk-..." # if empty, will use starter api_key
    temperature: 0.7
    search_engine: "tavily" # tavily, duckduckgo, jina
    max_urls: 6
    max_download_subtasks: null # null means no limit
    category: "SFT" # PT or SFT
    proxy: "http://127.0.0.1:7890"
    # default_mapping_format: "alpaca"  # default mapping format to auto-skip interaction
    # Webpage collect node configuration
    max_exploration_depth: 2 # Maximum depth for Playwright exploration
    max_jina_urls: 30 # Maximum URLs to explore with Jina per resource list page
    # Webpage dataset node configuration
    max_records_per_page: 20 # Maximum dataset records to generate per webpage (default: 10)
    min_relevance_score: 0.7 # Minimum relevance score for records (0.0-1.0, default: 0.7)

  webcrawler:
    # API 配置
    deepseek_api_key: "" # 从 starter.api_key_path 读取
    tavily_api_key: "" # 从 starter.tavily_api_key 读取
    deepseek_api_base: "https://api.deepseek.com/v1"
    # 模型配置
    model: "deepseek-chat"
    temperature: 0.7
    # 查询生成配置
    num_queries: 5
    # 爬取策略配置
    max_pages: 10000
    crawl_depth: 3
    max_links_per_page: 5
    concurrent_pages: 3
    # 内容过滤配置
    min_text_length: 500
    min_code_length: 50
    min_relevance_score: 6
    url_patterns: null
    # 运行时配置
    request_delay: 2.0
    timeout: 30
    max_retries: 3
    # 输出配置
    output_format: "jsonl"
    save_html: false
    output_dir: ""
    # 数据集生成配置
    max_records_per_page: 10
    dataset_concurrent_limit: 5
    max_content_length: 50000
    debug: false
    # 数据集映射配置
    sft_mapping_format: "jsonl_sft"
    pt_mapping_format: "jsonl_pt"

  # Obtainer debug flag (not nested in obtainer dict)
  obtainer_debug: false

  trainer:
    train_framework: "llamafactory"
    llamafactory_dir: "/home/lpc/repos/LLaMA-Factory/"
    train_input_dataset_path: "/home/lpc/repos/Dataflow-LoopAI/data/alpaca_en_demo.json" # to defined the path of training dataset (json/jsonl format)
    train_input_task_description: "训练一个能够回答简单问题和进行对话的AI助手模型，主要用于日常对话和基础问答任务" # to defined the task description for training
    train_input_config_template_path: "/home/lpc/repos/Dataflow-LoopAI/api/examples/bird.yaml" # to defined the path of llamafactory config template
    train_input_model_name: "/home/lpc/models/Qwen2.5-0.5B-Instruct/" # to defined the base model name for training
    # 可选
    output_dir: "/home/lpc/repos/Dataflow-LoopAI/outputs/training_test" # to defined the output directory for training
